services:
  selfhostapp-web:
    image: selfhostapp-web:latest
    container_name: selfhostapp-web
    build:
      context: ../../../
      dockerfile: angular/Dockerfile.local      
    ports:
      - "4200:80"
    depends_on:
      - selfhostapp-api
    volumes:
      - ./dynamic-env.json://usr/share/nginx/html/dynamic-env.json
    networks:
      - abp-network  

  selfhostapp-api:
    image: selfhostapp-api:latest
    container_name: selfhostapp-api-container
    build:
      context: ../../
      dockerfile: SelfHostApp/Dockerfile.local
    environment:
      - ASPNETCORE_URLS=https://+:8081;http://+:8080;
      - Kestrel__Certificates__Default__Path=/app/certs/localhost.pfx
      - Kestrel__Certificates__Default__Password=91f91912-5ab0-49df-8166-23377efaf3cc
      - App__SelfUrl=https://localhost:44321
      - App__HealthCheckUrl=http://selfhostapp:8080/health-status
      - AuthServer__Authority=http://selfhostapp-api:8080
      - AuthServer__RequireHttpsMetadata=false
      - AuthServer__SetSelfAsIssuer=true 
      - ConnectionStrings__Default=DataSource=/data/SelfHostApp.db
    ports:
      - "44321:8081"
    depends_on:
      sqlite:
        condition: service_healthy
    restart: on-failure    
    volumes:
      - sqlite_data:/data
      - ./certs:/app/certs
    networks:
      - abp-network  
  
  db-migrator:
    image: selfhostapp-api:latest
    container_name: db-migrator
    build:
      context: ../../
      dockerfile: SelfHostApp/Dockerfile.local
    environment:
      - ConnectionStrings__Default=DataSource=/data/SelfHostApp.db
    command:
      - --migrate-database
    depends_on:
      sqlite:
        condition: service_healthy
    volumes:
      - sqlite_data:/data
    networks:
      - abp-network
  sqlite:
    container_name: sqlite-container
    image: alpine:latest
    command: sh -c "apk add sqlite && touch /data/SelfHostApp.db && sqlite3 /data/SelfHostApp.db '.databases' && tail -f /dev/null"
    environment:
      - TZ=UTC
    volumes:
      - sqlite_data:/data
    networks:
      - abp-network
    healthcheck:
      test: ["CMD-SHELL", "if [ -f /data/SelfHostApp.db ]; then exit 0; else exit 1; fi"]
      interval: 10s
      timeout: 3s
      retries: 10
volumes:
  sqlite_data:
    name: selfhostapp_sqlite_data
networks:
  abp-network:
    name: selfhostapp-network
    driver: bridge